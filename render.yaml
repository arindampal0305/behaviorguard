services:
  - type: web
    name: behaviorguard-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python model.py
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0